name: Keep Render Alive

on:
  schedule:
    # Her 10 dakikada bir çalış (Render'ı uyandır)
    - cron: '*/10 * * * *'
  workflow_dispatch:  # Manuel tetikleme

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Health Check
        run: |
          echo "Pinging Render..."
          curl -f https://marketplace-platform-saz4.onrender.com/api/health || echo "Health check failed"
          
      - name: Ping Admin Stats
        run: |
          echo "Checking stats..."
          curl -f https://marketplace-platform-saz4.onrender.com/api/stats || echo "Stats check failed"
